name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLIGHTDECK_DATABASE_URL: postgresql+asyncpg://flightdeck:flightdeck@localhost:5432/flightdeck
  FLIGHTDECK_REDIS_URL: redis://localhost:6379/0

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flightdeck
          POSTGRES_PASSWORD: flightdeck
          POSTGRES_DB: flightdeck
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flightdeck"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync

      - name: Apply database migrations
        run: uv run flightdeck db init

      - name: Seed reference data
        run: uv run flightdeck db seed

      - name: Lint
        run: uv run ruff check app tests

      - name: Test
        run: uv run pytest -v
